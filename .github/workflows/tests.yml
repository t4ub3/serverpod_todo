name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION: "3.4.10"
      SERVERPOD_PASSWORD_database: "qqJWbgH1H54guiTBzcKnGbuwMsaDNQtU"
      SERVERPOD_PASSWORD_redis: "a4Dt4h1yElDKdTOskenwwfjOWf70qyAE"

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.8"

      - name: Start containers
        working-directory: todo_server
        run: docker compose up --quiet-pull --build -d

      - name: Install dependencies
        run: flutter pub get

      - name: Install Serverpod CLI
        run: dart pub global activate serverpod_cli $VERSION

      - name: Run Serverpod generator
        working-directory: todo_server
        run: serverpod generate

      - name: Run tests
        working-directory: todo_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: todo_server
        run: docker compose down -v
