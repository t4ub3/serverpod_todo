services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: serverpod_todo
      POSTGRES_PASSWORD: "aYz7WbWCsgvoTD7ltnCnoQZVf9L9oWSz"
    volumes:
      - serverpod_todo_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "DFLK6mMIDJrNDFg9Sg92lXAJ7gl669qy"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: serverpod_todo_test
      POSTGRES_PASSWORD: "qqJWbgH1H54guiTBzcKnGbuwMsaDNQtU"
    volumes:
      - serverpod_todo_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "a4Dt4h1yElDKdTOskenwwfjOWf70qyAE"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  serverpod_todo_data:
  serverpod_todo_test_data:
